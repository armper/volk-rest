spring:
  profiles:
    active: local
  data:
    mongodb:
      auto-index-creation: true

server:
  address: ${SERVER_ADDRESS:127.0.0.1}
  port: 8091

volk:
  security:
    # When set, all requests (except health and CORS preflight) must send
    # this value in the X-API-Key header. Empty disables auth (local dev).
    api-key: ${VOLK_API_KEY:}
  access:
    # Local mode enforces the operating-system identity running Volk.
    user: ${VOLK_CURRENT_USER:${user.name}}
    # Leave empty to resolve groups with `id -Gn <user>` on Unix-like systems.
    groups: ${VOLK_CURRENT_GROUPS:}
    admin-users: ${VOLK_ADMIN_USERS:}
  cors:
    allowed-origins: ${VOLK_CORS_ALLOWED_ORIGINS:http://localhost:4200}
